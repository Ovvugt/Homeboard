name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  packages: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build
        working-directory: Homeboard.Backend
        run: dotnet build
      - name: Test
        working-directory: Homeboard.Backend
        run: dotnet test --no-build

  version:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve version
        id: version
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          BASE="${TAG#v}"
          echo "VERSION=${BASE}.${GITHUB_RUN_NUMBER}+g${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

  build:
    needs: [version]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase repository owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/homeboard:latest
            ghcr.io/${{ steps.owner.outputs.value }}/homeboard:sha-${{ github.sha }}
          build-args: |
            VERSION=${{ needs.version.outputs.version || '0.0.0-dev' }}
          cache-from: type=gha,scope=homeboard
          cache-to: type=gha,mode=max,scope=homeboard
